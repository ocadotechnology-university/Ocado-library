name: Run backend build with Maven

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "zulu"
          cache: maven

      - name: Build backend with Maven
        run: mvn -B package --file backend/ocado-library-backend/pom.xml

      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@v4
        with:
          maven-project-file: pom.xml
          directory: backend/ocado-library-backend