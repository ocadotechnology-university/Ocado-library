name: Frontend Tests

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: library-ui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: library-ui

      - name: Run frontend tests
        run: npm run test
        working-directory: library-ui