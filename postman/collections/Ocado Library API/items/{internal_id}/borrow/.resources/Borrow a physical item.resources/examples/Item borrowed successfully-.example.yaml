$kind: http-example
name: Item borrowed successfully.
request:
  url: "{{baseUrl}}/items/:internal_id/borrow"
  method: POST
  headers:
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: internal_id
      value: string
      description: Physical item identifier (e.g. OC-B-WR-001)
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: ""
order: 1000
