$kind: http-example
name: Authenticated but insufficient role (Admin required).
request:
  url: "{{baseUrl}}/descriptions/:type/all?search=string&category=string&show_archived=false"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: search
      value: string
      description: Free-text search on title and author fields.
    - key: category
      value: string
      description: Books only — filter by category field.
    - key: show_archived
      value: "false"
      description: Admin only — include descriptions whose physical copies are all `ARCHIVED`. Employees receive 403 if true.
  pathVariables:
    type: Book
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "status": 9557,
        "error": "string",
        "message": "string"
      }
order: 3000
