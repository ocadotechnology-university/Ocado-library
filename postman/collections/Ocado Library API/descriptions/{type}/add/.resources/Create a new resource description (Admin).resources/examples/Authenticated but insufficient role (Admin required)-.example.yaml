$kind: http-example
name: Authenticated but insufficient role (Admin required).
request:
  url: "{{baseUrl}}/descriptions/:type/add"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    type: Book
  body:
    type: json
    content: |-
      {
        "title": "string",
        "author": "string",
        "isbn": "string",
        "description": "string",
        "category": "string",
        "tags": [
          "string",
          "string"
        ]
      }
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "status": 9557,
        "error": "string",
        "message": "string"
      }
order: 3000
