  content: |-
    {
      "title": "string",
      "author": "string",
      "description": "string",
      "category": "string",
      "status": "IN_OFFICE",
      "tags": [
        "string",
        "string"
      ]
    }
examples: ./.resources/Update a resource description (Admin).resources/examples
order: 1000
