$kind: http-example
name: Resource not found.
request:
  url: "{{baseUrl}}/admin/items/:internal_id/status"
  method: PATCH
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: internal_id
      value: string
      description: Physical item identifier (e.g. OC-B-WR-001)
  body:
    type: json
    content: |-
      {
        "status": "LOST",
        "reason": "string"
      }
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "status": 9557,
        "error": "string",
        "message": "string"
      }
order: 4000
