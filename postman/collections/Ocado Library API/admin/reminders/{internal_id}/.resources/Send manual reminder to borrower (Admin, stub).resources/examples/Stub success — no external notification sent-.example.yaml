$kind: http-example
name: Stub success — no external notification sent.
request:
  url: "{{baseUrl}}/admin/reminders/:internal_id"
  method: POST
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: internal_id
      value: string
      description: Physical item identifier (e.g. OC-B-WR-001)
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "ok": true,
        "message": "Reminder queued (stub)"
      }
order: 1000
