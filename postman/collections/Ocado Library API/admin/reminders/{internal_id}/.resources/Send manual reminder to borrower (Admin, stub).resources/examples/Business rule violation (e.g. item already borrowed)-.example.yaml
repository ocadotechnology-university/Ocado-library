$kind: http-example
name: Business rule violation (e.g. item already borrowed).
request:
  url: "{{baseUrl}}/admin/reminders/:internal_id"
  method: POST
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: internal_id
      value: string
      description: Physical item identifier (e.g. OC-B-WR-001)
response:
  statusCode: 409
  statusText: Conflict
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "status": 9557,
        "error": "string",
        "message": "string"
      }
order: 5000
