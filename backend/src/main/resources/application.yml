spring:
  application:
    name: library-api
  config:
    import: optional:file:.env[.properties]

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, profile, email
            redirect-uri: http://localhost:8080/login/oauth2/code/google

  datasource:
    url: jdbc:postgresql://localhost:5433/${POSTGRES_DB}
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
  servlet:
    session:
      cookie:
        same-site: lax
        path: /

app:
  jwt:
    secret: ${JWT_SECRET:ocado-library-dev-jwt-secret-change-in-production-min-32-chars}
    expiration-hours: 24
  security:
    admin-emails: "mikhaildek23@gmail.com,280949@student.pwr.edu.pl,281158@student.pwr.edu.pl"
  oauth2:
    frontend-url: ${FRONTEND_URL:http://localhost:5173}
    login-failure-url: ${FRONTEND_URL:http://localhost:5173}/login?error=oauth_failed
  notifications:
    slack:
      enabled: ${SLACK_ENABLED:false}
      bot-token: ${SLACK_BOT_TOKEN:}
    loan-limits-days:
      book: 120
      board-game: 240
    cron: "0 0 8 * * *"
    reminder-cooldown-days: 7
    ping-cooldown-hours: 0
