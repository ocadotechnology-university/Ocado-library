spring.application.name=ocado-library-backend

# PRZED datasource — inaczej POSTGRES_* z .env nie ma skąd się wziąć; ścieżki względem katalogu roboczego JVM (u Ciebie: Ocado-library)
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties],optional:file:backend/.env[.properties]

# --- PostgreSQL (nadpisuj przez .env w root repo LUB backend/.env LUB zmienne środowiskowe) ---
spring.datasource.url=jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:postgres}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Stały użytkownik API (bez logowania) — dziennik, borrow/return, uprawnienia admin
app.api.user-email=employee@ocado.com
app.api.user-admin=true
