#spring.h2.console.enabled=true

# --- PostgreSQL (odkomentuj zeby uzyc) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.config.import=optional:file:.env[.properties]

# Google OAuth 2.0 (ustaw GOOGLE_CLIENT_ID i GOOGLE_CLIENT_SECRET w .env)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Tylko konta w tej domenie e-mail mogą się zalogować (wewnętrzni użytkownicy Ocado)
app.security.allowed-email-domain=ocado.com